# CI/CD for Pocket Shop
#
# Jobs:
#   backend-ci  — Django system check + migrate dry-run (every push/PR)
#   android-apk — Flutter release APK, uploaded as artifact (main branch only)
#
# Required GitHub secrets / variables:
#   vars.POCKET_API_BASE_URL  — e.g. https://pocket-production-ffd6.up.railway.app/api/
#   secrets.DJANGO_SECRET_KEY — any random string for CI check
#   secrets.UPLOAD_KEYSTORE_BASE64   — Play upload keystore (.jks) base64-encoded
#   secrets.UPLOAD_KEYSTORE_PASSWORD — keystore + key password (alias is "upload")

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# ── Backend CI ────────────────────────────────────────────────────────────────
jobs:
  backend-ci:
    name: Backend — Django check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: pocket_backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        env:
          DJANGO_ENV: production
          DJANGO_SECRET_KEY: ci-only-not-a-real-secret
          DATABASE_URL: sqlite:///ci-check.db
          AFRICAS_TALKING_API_KEY: dummy
        run: python manage.py check --deploy 2>&1 | grep -v "security" || true

      - name: Migrations up to date
        env:
          DJANGO_ENV: development
          DJANGO_SECRET_KEY: ci-only-not-a-real-secret
          DATABASE_URL: sqlite:///ci-check.db
        run: python manage.py migrate --run-syncdb --noinput

# ── Flutter APK ───────────────────────────────────────────────────────────────
  android-apk:
    name: Flutter — Android release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: pocket_shop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        run: |
          API_URL="${{ vars.POCKET_API_BASE_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://mypocketshop.store/api/"
          fi
          echo "Building with API_BASE_URL=$API_URL"
          flutter build apk --release --dart-define=API_BASE_URL="$API_URL"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pocket-shop-${{ github.sha }}-release
          path: pocket_shop/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
          if-no-files-found: error

# ── Flutter AAB (Play Store) ─────────────────────────────────────────────────
  android-aab:
    name: Flutter — Play Store bundle (AAB)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: pocket_shop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Restore upload keystore
        env:
          KEYSTORE_B64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ] || [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "::error::UPLOAD_KEYSTORE_BASE64 / UPLOAD_KEYSTORE_PASSWORD secrets are not set"
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEYSTORE_PASSWORD
          keyAlias=upload
          storeFile=../upload-keystore.jks
          EOF

      - name: Build release AAB
        run: |
          API_URL="${{ vars.POCKET_API_BASE_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://mypocketshop.store/api/"
          fi
          echo "Building with API_BASE_URL=$API_URL"
          flutter build appbundle --release --dart-define=API_BASE_URL="$API_URL"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: pocket-shop-${{ github.sha }}-playstore-aab
          path: pocket_shop/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error
