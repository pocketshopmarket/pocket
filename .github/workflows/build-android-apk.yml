# Builds a release APK for pocket_shop/ and uploads app-release.apk.
#
# Base URL: https://mypocketshop.store/api/
# Override via workflow_dispatch input or repo variable POCKET_API_BASE_URL.

name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Override API base for this run only (e.g. https://mypocketshop.store/api/)"
        required: false
        type: string
        default: ""
  push:
    branches: [main, master]
    paths:
      - "pocket_shop/**"
      - ".github/workflows/build-android-apk.yml"

defaults:
  run:
    working-directory: pocket_shop

env:
  FALLBACK_API_BASE_URL: "https://mypocketshop.store/api/"

jobs:
  android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: |
          set -e
          API_URL="${{ inputs.api_base_url }}"
          if [ -z "$API_URL" ]; then API_URL="${{ vars.POCKET_API_BASE_URL }}"; fi
          if [ -z "$API_URL" ]; then API_URL="$FALLBACK_API_BASE_URL"; fi
          echo "Using API_BASE_URL=$API_URL"
          flutter build apk --release --dart-define=API_BASE_URL="$API_URL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-shop-release-apk
          path: pocket_shop/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
