name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows you to manually trigger the build from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Flutter requires Java 17 for modern Android builds

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # You can specify exact flutter version here if needed (e.g. flutter-version: '3.19.0')

      - name: Get dependencies
        working-directory: ./pocket_shop
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: ./pocket_shop
        # The release build will use your AndroidManifest.xml which already has android:usesCleartextTraffic="true"
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-app-release
          path: pocket_shop/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
